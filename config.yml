# Configuration for Rasa Core.
# https://rasa.com/docs/rasa/core/policies/
policies:
  - name: RulePolicy
  - name: MemoizationPolicy

  - name: TEDPolicy
    max_history: 5
    epochs: 150 # 🔥 tăng thêm
    constrain_similarities: true

  - name: UnexpecTEDIntentPolicy
    max_history: 5
    epochs: 150
    constrain_similarities: true
    fallback_intent_name: "ngoai_pham_vi"
    fallback_threshold: 0.4 # 🔥 tăng nhẹ
